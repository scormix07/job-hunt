<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Hunt</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%234f8cff'/><circle cx='8' cy='8' r='3' fill='%230f1115'/></svg>" />
</head>
<body>
  <aside id="sidebar">
    <header>
      <h1>Job Hunt</h1>
      <button id="scan-btn" title="Scan all filters now">Scan now</button>
    </header>

    <div id="add-panel">
      <div id="add-tabs">
        <button class="add-tab active" data-panel="presets">Presets</button>
        <button class="add-tab" data-panel="custom">Custom</button>
      </div>

      <div id="panel-presets">
        <h2>Job titles</h2>
        <div id="preset-titles" class="chips"></div>
        <h2>Keywords</h2>
        <div id="preset-keywords" class="chips"></div>
        <p class="hint">Click to start monitoring in <b id="preset-location"></b>.</p>
      </div>

      <form id="filter-form" hidden>
        <input name="keywords" placeholder="Keywords or job title" required />
        <input name="location" placeholder="Location (e.g. Remote, Saudi Arabia)" />
        <div class="row">
          <select name="timeRange">
            <option value="24h">Past 24h</option>
            <option value="week" selected>Past week</option>
            <option value="month">Past month</option>
          </select>
          <select name="workType">
            <option value="">Any type</option>
            <option value="remote">Remote</option>
            <option value="hybrid">Hybrid</option>
            <option value="onsite">On-site</option>
          </select>
        </div>
        <button type="submit">Add filter</button>
      </form>
    </div>

    <nav id="filter-list"></nav>
  </aside>

  <main>
    <div id="toolbar">
      <div id="tabs">
        <button data-status="new" class="tab active">New <span id="new-count" class="badge"></span></button>
        <button data-status="" class="tab">All</button>
        <button data-status="saved" class="tab">Saved</button>
        <button data-status="hidden" class="tab">Hidden</button>
      </div>
      <div class="toolbar-right">
        <button id="apply-kit-btn">Apply kit</button>
        <button id="mark-seen-btn">Mark all seen</button>
      </div>
    </div>
    <div id="status-line"></div>
    <div id="job-list"></div>
    <div id="apply-kit" hidden>
      <section class="kit-card">
        <header><h3>Headline</h3><button class="copy-btn" data-copy="headline">Copy</button></header>
        <pre id="kit-headline"></pre>
      </section>
      <section class="kit-card">
        <header><h3>Summary</h3><button class="copy-btn" data-copy="summary">Copy</button></header>
        <pre id="kit-summary"></pre>
      </section>
      <section class="kit-card">
        <header><h3>Cover letter</h3><button class="copy-btn" data-copy="coverLetter">Copy</button></header>
        <pre id="kit-coverLetter"></pre>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
